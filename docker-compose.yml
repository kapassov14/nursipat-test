# PostgreSQL для приложения психологического профайлинга
version: "3.8"
services:
  postgres:
    image: postgres:16-alpine
    container_name: nursipat-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: nursipat
      POSTGRES_PASSWORD: nursipat_secret
      POSTGRES_DB: nursipat_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
